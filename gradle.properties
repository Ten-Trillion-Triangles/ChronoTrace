kotlin.code.style=official
org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
org.gradle.configuration-cache=true
org.gradle.parallel=true

# Force Gradle to use JDK 21 — Kotlin 2.2.21 crashes on JDK 25 with
# IllegalArgumentException in JavaVersion.parse when running under JDK 25+.
# Change this path if your JDK 21 install lives elsewhere.
org.gradle.java.home=/usr/lib/jvm/java-21-openjdk-amd64

# Maven coordinates for all ChronoTrace artifacts
CHRONOTRACE_GROUP_ID=com.chronotrace
CHRONOTRACE_VERSION=0.1.0-SNAPSHOT

